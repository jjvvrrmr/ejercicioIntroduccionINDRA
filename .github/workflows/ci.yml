name: CI Workflow

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
      - uses: actions/checkout@v4

      - name: Mensaje confirmación
      - run: echo "Ejecutando checkout"

      - name: Contruir imagen docker
      - run: docker build -t imagen-script .

      - name: Dockerizar
      - run: docker run imagen-script
